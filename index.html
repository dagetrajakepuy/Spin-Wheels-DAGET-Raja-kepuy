<!DOCTYPE html>
<html>
<head>
<title>Spin Berhadiah</title>
<style>
body { text-align:center; font-family: Arial; }
#wheel {
  margin:20px auto;
  width:200px;
  height:200px;
  border-radius:50%;
  border:5px solid black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
}
button { padding:10px 20px; }
</style>
</head>

<body>

<h2>🎡 Spin Berhadiah</h2>

<input id="user" placeholder="Masukkan No HP"><br><br>
<button onclick="spin()">SPIN</button>

<div id="wheel">🎡</div>

<h3 id="hasil"></h3>

<script>
let data = JSON.parse(localStorage.getItem("data") || "{}");
let hadiah = [100,200,500,1000,2000,5000,10000];

function spin(){
 let u = document.getElementById("user").value;

 if(!u) return alert("Isi No HP!");
 if(data[u]) return alert("Udah spin!");
 if(Object.keys(data).length >= 10) return alert("Kuota habis!");

 let wheel = document.getElementById("wheel");
 wheel.innerText = "⏳";

 setTimeout(() => {
   let h = hadiah[Math.floor(Math.random()*hadiah.length)];

   data[u]=h;
   localStorage.setItem("data", JSON.stringify(data));

   wheel.innerText = "🎉";
   document.getElementById("hasil").innerText = "Selamat! Dapat Rp " + h;

 }, 2000);
}
</script>

</body>
</html>
